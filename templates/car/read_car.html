{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: #f8fafc;
    }

    .group-container {
        max-width: 850px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .group-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 40px;

        box-shadow: 0 15px 40px rgba(15, 23, 42, 0.06);
        transition: all 0.3s ease;
    }

    .group-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 55px rgba(15, 23, 42, 0.08);
    }

    .group-title {
        text-align: center;
        font-size: 1.9rem;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 30px;
    }

    .details {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 14px 16px;

        border: 1px solid #f1f5f9;
        border-radius: 12px;

        background: #ffffff;

        transition: all 0.2s ease;
    }

    .row:hover {
        background: #f8fafc;
        border-color: #e2e8f0;
    }

    .label {
        font-size: 0.95rem;
        font-weight: 600;
        color: #334155;
    }

    .value {
        font-size: 0.95rem;
        color: #0f172a;
        text-align: right;
        max-width: 60%;
        word-break: break-word;
    }

    .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        background: #e2e8f0;
        color: #0f172a;
    }

    .badge-active {
        background: #dcfce7;
        color: #166534;
    }

    .badge-inactive {
        background: #fee2e2;
        color: #991b1b;
    }

    .actions {
        text-align: center;
        margin-top: 30px;
    }

    .back-btn {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 12px;

        background: #2563eb;
        color: #ffffff;

        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;

        transition: all 0.2s ease;
    }

    .back-btn:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    @media (max-width: 640px) {
        .row {
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        .value {
            text-align: left;
            max-width: 100%;
        }
    }
</style>

<div class="group-container">

    <div class="group-card">

        <h1 class="group-title">
            {{ car.model }} {{ car.brand }}
        </h1>

        <div class="details">

            <div class="row">
                <span class="value">{{ car.price }}</span>
            </div>

            <div class="row">
                <span class="value">{{ car.year }}</span>
            </div>

            <div class="row">
                <span class="value">{{ car.color }}</span>
            </div>

            <div class="row">
                <span class="value">{{ car.mileage }}</span>
            </div>

            <div class="row">
                <span class="value">{{ car.created_at }}</span>
            </div>

        </div>

        <div class="actions">
            <a href="{% url 'list' %}" class="back-btn">
                Back
            </a>
        </div>

    </div>

</div>

{% endblock %}
